name: Release Guardrails

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.29"

      - name: Sync dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard_web/package-lock.json

      - name: Lint
        run: uv run --python 3.11 --extra dev ruff check .

      - name: Dashboard build
        run: npm --prefix dashboard_web ci && npm --prefix dashboard_web run build

      - name: Test with coverage
        run: uv run --python 3.11 --extra dev python -m pytest -q --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

      - name: Security audit
        run: uv run --python 3.11 --extra dev pip-audit --output json --output-file pip-audit.json || true

      - name: Upload security audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 14

      - name: Fixture pipeline proof
        run: uv run --python 3.11 make sample-pipeline PYTHON='uv run --python 3.11 python'

      - name: dbt parse
        working-directory: analytics/dbt
        env:
          KNIGHTVISION_DUCKDB_PATH: ../../warehouse/knightvision_sample.duckdb
          KNIGHTVISION_DBT_THREADS: "1"
        run: uv run --python 3.11 dbt parse --profiles-dir .

      - name: dbt run
        working-directory: analytics/dbt
        env:
          KNIGHTVISION_DUCKDB_PATH: ../../warehouse/knightvision_sample.duckdb
          KNIGHTVISION_DBT_THREADS: "1"
        run: uv run --python 3.11 dbt run --profiles-dir .

      - name: dbt test
        working-directory: analytics/dbt
        env:
          KNIGHTVISION_DUCKDB_PATH: ../../warehouse/knightvision_sample.duckdb
          KNIGHTVISION_DBT_THREADS: "1"
        run: uv run --python 3.11 dbt test --profiles-dir .
