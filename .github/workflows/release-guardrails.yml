name: Release Guardrails

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.29"

      - name: Sync dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Lint
        run: uv run --python 3.11 ruff check .

      - name: Test
        run: uv run --python 3.11 python -m pytest -q

      - name: Fixture pipeline proof
        run: uv run --python 3.11 make sample-pipeline PYTHON='uv run --python 3.11 python'

      - name: dbt parse
        working-directory: analytics/dbt
        env:
          KNIGHTVISION_DUCKDB_PATH: ../../warehouse/knightvision_sample.duckdb
          KNIGHTVISION_DBT_THREADS: "1"
        run: uv run --python 3.11 dbt parse --profiles-dir .

      - name: dbt run
        working-directory: analytics/dbt
        env:
          KNIGHTVISION_DUCKDB_PATH: ../../warehouse/knightvision_sample.duckdb
          KNIGHTVISION_DBT_THREADS: "1"
        run: uv run --python 3.11 dbt run --profiles-dir .

      - name: dbt test
        working-directory: analytics/dbt
        env:
          KNIGHTVISION_DUCKDB_PATH: ../../warehouse/knightvision_sample.duckdb
          KNIGHTVISION_DBT_THREADS: "1"
        run: uv run --python 3.11 dbt test --profiles-dir .
