x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: orchestration/Dockerfile.airflow
  image: knightvision-airflow:local
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW_UID: "${AIRFLOW_UID:-50000}"
    TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
    TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    HOME: /home/airflow
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    PATH: /home/airflow/.local/bin:/usr/lib/jvm/java-17-openjdk-amd64/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    PYTHONPATH: /home/airflow/.local/lib/python3.11/site-packages:/opt/airflow/project
  volumes:
    - ../:/opt/airflow/project:Z
    - ./dags:/opt/airflow/dags:Z
    - ./plugins:/opt/airflow/plugins:Z
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  working_dir: /opt/airflow/project
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - airflow_postgres:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Knight \
          --lastname Vision \
          --role Admin \
          --email airflow@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

volumes:
  airflow_logs:
  airflow_postgres:
